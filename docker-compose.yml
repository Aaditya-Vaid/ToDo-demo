services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todo}
      POSTGRES_DB: ${POSTGRES_DB:-todo}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todo} -d ${POSTGRES_DB:-todo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://todo:todo@db:5432/todo}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-with-at-least-32-bytes}
      CORS_ORIGINS: "http://${APP_HOST:-localhost}:5173,http://localhost:5173,http://127.0.0.1:5173"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: "http://${APP_HOST:-localhost}:8000"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
